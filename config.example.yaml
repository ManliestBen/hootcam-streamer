# Hootcam Streamer – RTSP streams from Pi CSI cameras
# Copy to config.yaml and adjust as needed.

mediamtx_path: mediamtx
rtsp_port: 8554
# Backend: "rpicam-vid" (default), "picamera2", or "spyglass".
# spyglass = two Spyglass MJPEG servers (one per camera). No MediaMTX/ffmpeg needed.
# backend: rpicam-vid
# backend: spyglass
# spyglass_port_cam0: 8080
# spyglass_port_cam1: 8081
# If port 8000 (MediaMTX RTP) or 8001 (RTCP) is already in use, set an alternate RTP port.
# MediaMTX will use mediamtx_rtp_port and mediamtx_rtp_port+1 for RTCP.
# mediamtx_rtp_port: 8010
# On startup, kill any leftover rpicam-vid/libcamera-vid/mediamtx from a previous crash so cameras are free (default: true).
# kill_leftover_processes: true

cam0:
  enabled: true
  width: 1920
  height: 1080
  fps: 25
  bitrate: 4000000

# On Pi 5, set enabled: false for cam1 if the second pipeline fails with "Pipeline handler in use".
cam1:
  enabled: true
  width: 1920
  height: 1080
  fps: 25
  bitrate: 4000000
