# Hootcam Streamer – two Spyglass MJPEG streams from Pi CSI cameras
# Copy to config.yaml and adjust as needed.

spyglass_port_cam0: 8082
spyglass_port_cam1: 8083
# Port for the streamer API (GET/PATCH /config). Hootcam Motion can push resolution/fps from the UI when you set streamer_api_url in Motion's global config.
# streamer_api_port: 8084
# Seconds to wait after starting cam0 before starting cam1 (reduces contention on Pi 5). Increase if cam1 fails.
# spyglass_cam1_stagger_sec: 5.0

cam0:
  enabled: true
  width: 1920
  height: 1080
  fps: 25
  bitrate: 4000000
  # Fixed focus (only on modules that support it, e.g. Camera Module 3). Use autofocus: manual and lens_position (0 = infinity, ~0.5 = 50 cm).
  # autofocus: manual
  # lens_position: 0.0

# If the second stream freezes after a few seconds, use lower res/fps for cam1 to reduce load (e.g. 1280x720 @ 15 fps).
cam1:
  enabled: true
  width: 1920
  height: 1080
  fps: 25
  bitrate: 4000000
  # Lighter option for stability when both streams run: width: 1280, height: 720, fps: 15
  # Fixed focus per lens (same as cam0):
  # autofocus: manual
  # lens_position: 0.0
